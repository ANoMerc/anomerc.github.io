<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Diary — Your Personal Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme */
            --color-bg-primary: #f8fafc;
            --color-bg-secondary: #ffffff;
            --color-bg-tertiary: #f1f5f9;
            --color-text-primary: #0f172a;
            --color-text-secondary: #475569;
            --color-text-tertiary: #94a3b8;
            --color-border: #e2e8f0;
            --color-primary: #6366f1;
            --color-primary-hover: #4f46e5;
            --color-primary-light: #eef2ff;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-high-priority: #dc2626;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --color-bg-primary: #0f172a;
            --color-bg-secondary: #1e293b;
            --color-bg-tertiary: #334155;
            --color-text-primary: #f8fafc;
            --color-text-secondary: #cbd5e1;
            --color-text-tertiary: #64748b;
            --color-border: #334155;
            --color-primary: #818cf8;
            --color-primary-hover: #6366f1;
            --color-primary-light: #312e81;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4), 0 4px 6px -4px rgb(0 0 0 / 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.6;
            transition: var(--transition);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            box-shadow: var(--shadow-md);
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        /* Buttons */
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-md);
            border: none;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--color-bg-tertiary);
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            background: var(--color-border);
        }

        .btn-icon {
            padding: 0.625rem;
            border-radius: var(--radius-md);
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.125rem;
        }

        .btn-icon:hover {
            background: var(--color-border);
            transform: translateY(-1px);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--color-bg-secondary);
            padding: 0.375rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            width: fit-content;
            box-shadow: var(--shadow-sm);
        }

        .tab {
            padding: 0.625rem 1.5rem;
            border-radius: var(--radius-md);
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            font-size: 0.875rem;
        }

        .tab:hover {
            color: var(--color-text-primary);
        }

        .tab.active {
            background: var(--color-primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--color-bg-secondary);
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        /* Notes Grid */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .note-card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--color-primary);
            opacity: 0;
            transition: var(--transition);
        }

        .note-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-3px);
        }

        .note-card:hover::before {
            opacity: 1;
        }

        .note-card.high-priority {
            border-left: 4px solid var(--color-high-priority);
        }

        .note-card.high-priority::before {
            background: var(--color-high-priority);
            opacity: 1;
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }

        .note-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin: 0;
            line-height: 1.4;
        }

        .note-meta {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            font-size: 0.8rem;
            color: var(--color-text-tertiary);
            margin-bottom: 0.75rem;
        }

        .note-date {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .note-priority {
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .priority-high {
            background: #fef2f2;
            color: var(--color-high-priority);
        }

        [data-theme="dark"] .priority-high {
            background: rgba(220, 38, 38, 0.2);
        }

        .priority-normal {
            background: var(--color-primary-light);
            color: var(--color-primary);
        }

        .note-text {
            color: var(--color-text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }

        /* Calendar */
        .calendar-container {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .calendar-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .calendar-nav {
            display: flex;
            gap: 0.5rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .calendar-day-header {
            text-align: center;
            padding: 0.75rem;
            font-weight: 600;
            color: var(--color-text-tertiary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            background: var(--color-bg-tertiary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            min-height: 80px;
        }

        .calendar-day:hover {
            background: var(--color-primary-light);
            transform: scale(1.05);
        }

        .calendar-day.today {
            background: var(--color-primary);
            color: white;
            font-weight: 700;
            box-shadow: var(--shadow-md);
        }

        .calendar-day.has-notes::after {
            content: '';
            position: absolute;
            bottom: 6px;
            width: 5px;
            height: 5px;
            background: var(--color-success);
            border-radius: 50%;
        }

        .calendar-day.today.has-notes::after {
            background: white;
        }

        .day-number {
            font-size: 0.9375rem;
            font-weight: 500;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--color-bg-secondary);
            border-radius: var(--radius-xl);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-xl);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.open .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-text-primary);
            font-size: 0.875rem;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.9375rem;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            transition: var(--transition);
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-light);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--color-text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--color-text-primary);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note-card {
            animation: fadeIn 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header {
                padding: 1rem;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }

            .calendar-container {
                padding: 1rem;
            }

            .calendar-day {
                min-height: 60px;
                padding: 0.5rem;
            }

            .stats-bar {
                grid-template-columns: 1fr;
            }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--color-bg-secondary);
            color: var(--color-text-primary);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            border-left: 4px solid var(--color-success);
        }

        .toast-error {
            border-left: 4px solid var(--color-danger);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-tertiary);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo">
                <div class="logo-icon">📔</div>
                <span>Project Diary</span>
            </a>
            <div class="header-actions">
                <button class="btn-icon" id="themeToggle" title="Toggle theme">🌓</button>
                <button class="btn-icon" id="notificationBtn" title="Enable notifications">🔔</button>
                <button class="btn btn-primary" id="addNoteBtn">
                    <span>+</span>
                    <span>Новая заметка</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Всего заметок</div>
                <div class="stat-value" id="totalNotes">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Высокий приоритет</div>
                <div class="stat-value" id="highPriorityNotes">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">На сегодня</div>
                <div class="stat-value" id="todayNotes">0</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-view="notes">📝 Заметки</button>
            <button class="tab" data-view="calendar">📅 Календарь</button>
        </div>

        <!-- Notes View -->
        <div id="notesView">
            <div class="notes-grid" id="notesGrid">
                <!-- Notes will be rendered here -->
            </div>
        </div>

        <!-- Calendar View -->
        <div id="calendarView" style="display: none;">
            <div class="calendar-container">
                <div class="calendar-header">
                    <h2 class="calendar-title" id="monthLabel"></h2>
                    <div class="calendar-nav">
                        <button class="btn btn-secondary" id="prevMonth">← Назад</button>
                        <button class="btn btn-secondary" id="nextMonth">Вперед →</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Calendar will be rendered here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="noteModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Новая заметка</h2>
            </div>
            <form id="noteForm">
                <div class="form-group">
                    <label class="form-label" for="inpTitle">Заголовок</label>
                    <input type="text" class="form-input" id="inpTitle" placeholder="Введите заголовок..." required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="inpText">Текст</label>
                    <textarea class="form-textarea" id="inpText" placeholder="Введите текст заметки..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="inpDate">Дата и время</label>
                    <input type="datetime-local" class="form-input" id="inpDate">
                </div>
                <div class="form-group">
                    <label class="form-label" for="inpPriority">Приоритет</label>
                    <select class="form-select" id="inpPriority">
                        <option value="normal">Обычный</option>
                        <option value="high">Высокий</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="closeModalBtn">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Database Module
        const DB = {
            name: 'ProjectDiaryDB',
            version: 1,
            storeName: 'notes',
            async init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.name, this.version);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.storeName)) {
                            db.createObjectStore(this.storeName, { keyPath: 'id' });
                        }
                    };
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async getAll() {
                const db = await this.init();
                return new Promise((res, rej) => {
                    const tx = db.transaction(this.storeName, 'readonly');
                    const store = tx.objectStore(this.storeName);
                    const req = store.getAll();
                    req.onsuccess = () => res(req.result.sort((a, b) => new Date(b.date) - new Date(a.date)));
                    req.onerror = () => rej(req.error);
                });
            },
            async save(note) {
                const db = await this.init();
                return new Promise((res, rej) => {
                    const tx = db.transaction(this.storeName, 'readwrite');
                    const store = tx.objectStore(this.storeName);
                    store.put(note);
                    tx.oncomplete = () => res();
                    tx.onerror = () => rej(tx.error);
                });
            },
            async delete(id) {
                const db = await this.init();
                return new Promise((res, rej) => {
                    const tx = db.transaction(this.storeName, 'readwrite');
                    tx.objectStore(this.storeName).delete(id);
                    tx.oncomplete = () => res();
                    tx.onerror = () => rej(tx.error);
                });
            }
        };

        // Reminder Manager
        const ReminderManager = {
            timers: new Map(),
            init() {
                if ('Notification' in window) {
                    document.getElementById('notificationBtn').onclick = () => {
                        Notification.requestPermission().then(permission => {
                            showToast(permission === 'granted' ? 'Уведомления включены' : 'Уведомления отклонены', 'success');
                        });
                    };
                }
                window.addEventListener('visibilitychange', () => this.syncTimers());
                this.syncTimers();
            },
            schedule(note) {
                if (!note.reminderTime) return;
                const triggerTime = new Date(note.reminderTime).getTime();
                const now = Date.now();
                const delay = triggerTime - now;
                
                if (delay > 0 && delay < 2147483647) {
                    this.timers.set(note.id, setTimeout(() => this.fire(note), delay));
                }
            },
            syncTimers() {
                this.timers.forEach((_, id) => clearTimeout(_));
                this.timers.clear();
                DB.getAll().then(notes => {
                    const now = Date.now();
                    notes.forEach(note => {
                        if (note.reminderTime) {
                            const noteTime = new Date(note.reminderTime).getTime();
                            if (noteTime > now && noteTime - now < 2147483647) {
                                this.schedule(note);
                            } else if (noteTime <= now && noteTime > now - 60000) {
                                this.fire(note);
                            }
                        }
                    });
                });
            },
            fire(note) {
                if (Notification.permission === 'granted') {
                    new Notification('Project Diary', { 
                        body: note.title,
                        icon: '📔'
                    });
                } else {
                    showToast(`Напоминание: ${note.title}`, 'info');
                }
            }
        };

        // UI Functions
        let currentNotes = [];
        let currentDate = new Date();

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        async function updateStats() {
            const today = new Date().toDateString();
            document.getElementById('totalNotes').textContent = currentNotes.length;
            document.getElementById('highPriorityNotes').textContent = 
                currentNotes.filter(n => n.priority === 'high').length;
            document.getElementById('todayNotes').textContent = 
                currentNotes.filter(n => n.date && new Date(n.date).toDateString() === today).length;
        }

        async function renderNotes() {
            currentNotes = await DB.getAll();
            const grid = document.getElementById('notesGrid');
            
            if (currentNotes.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">📝</div>
                        <div class="empty-title">Нет заметок</div>
                        <p>Создайте первую заметку, чтобы начать</p>
                    </div>
                `;
            } else {
                grid.innerHTML = currentNotes.map(note => `
                    <div class="note-card ${note.priority === 'high' ? 'high-priority' : ''}">
                        <div class="note-header">
                            <h3 class="note-title">${escapeHtml(note.title || 'Без названия')}</h3>
                        </div>
                        <div class="note-meta">
                            ${note.date ? `
                                <span class="note-date">
                                    <span>📅</span>
                                    <span>${formatDate(note.date)}</span>
                                </span>
                            ` : ''}
                            <span class="note-priority ${note.priority === 'high' ? 'priority-high' : 'priority-normal'}">
                                ${note.priority === 'high' ? 'Высокий' : 'Обычный'}
                            </span>
                        </div>
                        <p class="note-text">${escapeHtml(note.text || '')}</p>
                        <div class="note-actions">
                            <button class="btn btn-secondary btn-small" onclick="deleteNote('${note.id}')">
                                🗑️ Удалить
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            
            currentNotes.forEach(note => ReminderManager.schedule(note));
            await updateStats();
        }

        async function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthLabel').textContent = 
                new Intl.DateTimeFormat('ru-RU', { month: 'long', year: 'numeric' }).format(currentDate);

            const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            days.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-day-header';
                header.textContent = day;
                grid.appendChild(header);
            });

            const firstDay = new Date(year, month, 1).getDay() || 7;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 1; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }
            
            const noteDates = new Set(
                currentNotes.filter(n => n.date).map(n => new Date(n.date).toDateString())
            );

            for (let d = 1; d <= daysInMonth; d++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-day';
                const cellDate = new Date(year, month, d);
                const today = new Date();
                
                if (cellDate.toDateString() === today.toDateString()) {
                    cell.classList.add('today');
                }
                if (noteDates.has(cellDate.toDateString())) {
                    cell.classList.add('has-notes');
                }
                
                cell.innerHTML = `<span class="day-number">${d}</span>`;
                grid.appendChild(cell);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            return new Intl.DateTimeFormat('ru-RU', {
                day: 'numeric',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }).format(new Date(dateString));
        }

        // Event Listeners
        document.getElementById('addNoteBtn').onclick = () => {
            document.getElementById('modalTitle').textContent = 'Новая заметка';
            document.getElementById('noteForm').reset();
            document.getElementById('noteModal').classList.add('open');
        };

        document.getElementById('closeModalBtn').onclick = () => {
            document.getElementById('noteModal').classList.remove('open');
        };

        document.getElementById('noteForm').onsubmit = async (e) => {
            e.preventDefault();
            const note = {
                id: Date.now().toString(),
                title: document.getElementById('inpTitle').value,
                text: document.getElementById('inpText').value,
                date: document.getElementById('inpDate').value || new Date().toISOString(),
                priority: document.getElementById('inpPriority').value,
                reminderTime: document.getElementById('inpDate').value || null
            };
            await DB.save(note);
            document.getElementById('noteModal').classList.remove('open');
            showToast('Заметка сохранена', 'success');
            await Promise.all([renderNotes(), renderCalendar()]);
        };

        window.deleteNote = async (id) => {
            if (confirm('Удалить эту заметку?')) {
                await DB.delete(id);
                showToast('Заметка удалена', 'success');
                await Promise.all([renderNotes(), renderCalendar()]);
            }
        };

        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                t.classList.add('active');
                const view = t.dataset.view;
                document.getElementById('notesView').style.display = view === 'notes' ? 'block' : 'none';
                document.getElementById('calendarView').style.display = view === 'calendar' ? 'block' : 'none';
            };
        });

        document.getElementById('prevMonth').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        };

        document.getElementById('nextMonth').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        };

        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            showToast(`Тема: ${newTheme === 'dark' ? 'Тёмная' : 'Светлая'}`, 'success');
        };

        // Close modal on overlay click
        document.getElementById('noteModal').onclick = (e) => {
            if (e.target.id === 'noteModal') {
                document.getElementById('noteModal').classList.remove('open');
            }
        };

        // Initialize
        (async () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            ReminderManager.init();
            await renderNotes();
            renderCalendar();
        })();
    </script>
</body>
</html>
